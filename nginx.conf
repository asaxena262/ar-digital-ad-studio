# ============================================================
# Nginx config for AR Digital Ad Studio
# Place this file at:  /etc/nginx/sites-available/ardigitaladstudio.in
# Then:  sudo ln -s /etc/nginx/sites-available/ardigitaladstudio.in /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name ardigitaladstudio.in www.ardigitaladstudio.in;

    # Redirect www → non-www
    if ($host = www.ardigitaladstudio.in) {
        return 301 https://ardigitaladstudio.in$request_uri;
    }

    # Redirect HTTP → HTTPS (Let's Encrypt will add this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ardigitaladstudio.in;

    # ── SSL (managed by Certbot / Let's Encrypt) ──────────
    ssl_certificate     /etc/letsencrypt/live/ardigitaladstudio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ardigitaladstudio.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Gzip compression ───────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # ── Proxy all traffic to Node.js server ───────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Cache static assets at nginx level too ─────────────
    location ~* \.(css|js|webp|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass       http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public, max-age=604800, immutable";
    }

    # ── Logs ───────────────────────────────────────────────
    access_log /var/log/nginx/ardigitaladstudio.access.log;
    error_log  /var/log/nginx/ardigitaladstudio.error.log;
}
